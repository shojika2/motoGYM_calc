<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>motoGYM_calc v0.0.12</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#111;color:#fff;max-width:560px;margin:auto;padding:16px}
h2{margin:0 0 14px}
small{color:#bbb}
label{display:block;margin-top:12px;font-weight:bold}
input,button,textarea{width:100%;font-size:1.2rem;padding:10px;margin-top:6px;box-sizing:border-box;border-radius:8px;border:0}
.note{font-size:.9rem;color:#bbb;margin-top:4px;line-height:1.4}
.read{font-size:1rem;color:#7fd0ff;margin-top:4px;font-weight:bold}
.err{color:#ff7b8a}
.card{background:#222;padding:12px;border-radius:10px;margin:10px 0}
.big{font-size:2rem;font-weight:bold;text-align:center}
.resultCard{text-align:center}
.mineLabel,.ratioLabel{color:#bbb;font-size:1rem;margin-top:6px}
.mineTime{font-size:2.15rem;font-weight:900;margin:4px 0 10px}
.ratioBig{font-size:2.6rem;font-weight:900;margin:4px 0 10px;color:#7fd0ff}
.resultSub{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.resultSub div{background:#2a2a2a;border-radius:8px;padding:8px;font-size:.95rem}
.resultSub b{display:block;font-size:1.15rem;margin-top:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{background:#2d8cff;color:#fff;font-weight:bold}
button.secondary{background:#333}
button.danger{background:#c94455}
.hidden{display:none}
.log{background:#222;padding:12px;border-radius:10px;margin:10px 0}
</style>
</head>
<body>
<h2 id="appTitle" style="cursor:pointer">motoGYM_calc<br><small>v0.0.12</small></h2>

<div id="calcPage">
<label>トップタイム</label>
<div style="display:flex;gap:6px"><input style="flex:1" id="top" inputmode="numeric" pattern="[0-9]*" placeholder="例 109678"><button type="button" id="clrTop" style="width:64px">×</button></div>
<div id="topRead" class="read">認識: --</div>
<div class="note">例：59.321秒 → 059321 / 1:23.400 → 1234 / 1:59.600 → 1596</div>

<label>仮想トップ比(%)</label>
<div style="display:flex;gap:6px"><input style="flex:1" id="virt" inputmode="decimal" placeholder="空白=100%"><button type="button" id="clrVirt" style="width:64px">×</button></div>
<div class="note">空白の場合は100%として計算します。</div>

<label>自分のタイム</label>
<div style="display:flex;gap:6px"><input style="flex:1" id="mine" inputmode="numeric" pattern="[0-9]*" placeholder="例 118245"><button type="button" id="clrMine" style="width:64px">×</button></div>
<div id="mineRead" class="read">認識: --</div>
<div class="note">末尾の0は省略可。例：2:05.120 → 20512 / 2:05.000 → 205</div>

<div class="card resultCard">
<div class="mineLabel">自分のタイム</div>
<div class="mineTime" id="mineBig">--</div>
<div class="ratioLabel">タイム比</div>
<div class="ratioBig" id="ratio">-- %</div>
<div class="resultSub">
  <div>トップ<b id="topBig">--</b></div>
  <div>仮想トップ<b id="virtualBig">--</b></div>
</div>
</div>

<div class="grid">
<div class="card">105%<br><b id="p105">--</b></div>
<div class="card">110%<br><b id="p110">--</b></div>
<div class="card">115%<br><b id="p115">--</b></div>
<div class="card">120%<br><b id="p120">--</b></div>
</div>


<button id="clearBtn" class="secondary">入力値をクリア</button>
<button id="saveBtn">この計算結果を保存</button>
<button class="secondary" onclick="showLog()">Log画面</button>
</div>

<div id="savePage" class="hidden">
<h3>保存情報</h3>
<label>大会・練習会名</label><input id="event">
<label>年月日</label><input id="date" inputmode="numeric">
<label>マシン名</label><input id="machine">
<label>タイヤ銘柄</label><input id="tire">
<label>その他フリー入力事項</label><textarea id="memo"></textarea>
<button onclick="saveLog()">保存する</button>
<button class="secondary" onclick="hideSave()">戻る</button>
</div>

<div id="logPage" class="hidden">
<button class="secondary" onclick="showCalc()">計算画面へ戻る</button>
<button onclick="csv()">CSV出力</button>
<button class="danger" onclick="clearLogs()">全削除</button>
<div id="logList"></div>
</div>

<script>
const STORE="motoGYM_calc_logs_v007";
const STATE="motoGYM_calc_state_v007";
const META="motoGYM_calc_meta_v007";

function $(id){return document.getElementById(id)}

function parseTime(raw){
  let s=(raw||"").replace(/\D/g,"");
  if(!s)return {ok:false,sec:null,text:"--"};

  // 6桁以上：通常の mssSSS / mmssSSS
  // 例 109678 -> 1:09.678, 059321 -> 0:59.321
  if(s.length>=6){
    let ms=Number(s.slice(-3));
    let sec=Number(s.slice(-5,-3));
    let min=Number(s.slice(0,-5));
    if(sec>=60)return {ok:false,sec:null,text:"秒が60以上です"};
    let total=min*60+sec+ms/1000;
    return {ok:true,sec:total,text:fmt(total)};
  }

  // 5桁：mssSS または ssSSS の曖昧さを避けるため、秒だけは先頭0推奨。
  // 例 97321 は 0:97.321 ではなく 9:73.210 になってしまうので警告
  if(s.length==5 && Number(s.slice(-4,-2))>=60){
    return {ok:false,sec:null,text:"曖昧です。97.321秒は 137321 と入力してください"};
  }

  // 1〜5桁：人間入力ルール
  // 分 + 秒2桁 + ミリ秒1〜3桁、ミリ秒末尾0は省略可
  // 1234 -> 1:23.400, 1596 -> 1:59.600, 205 -> 2:05.000, 20512 -> 2:05.120
  let minPart, secPart, msPart;
  if(s.length<=2){
    minPart="0"; secPart=s.padStart(2,"0"); msPart="";
  }else{
    minPart=s.slice(0,-2);
    secPart=s.slice(-2);
    msPart="";
  }

  if(s.length>=4){
    minPart=s.slice(0,-3);
    secPart=s.slice(-3,-1).padStart(2,"0");
    msPart=s.slice(-1);
  }
  if(s.length==5){
    minPart=s.slice(0,-4);
    secPart=s.slice(-4,-2).padStart(2,"0");
    msPart=s.slice(-2);
  }

  let min=Number(minPart||0);
  let sec=Number(secPart||0);
  if(sec>=60)return {ok:false,sec:null,text:"秒が60以上です"};
  let ms=Number((msPart||"").padEnd(3,"0"));
  let total=min*60+sec+ms/1000;
  return {ok:true,sec:total,text:fmt(total)};
}

function fmt(x){
  if(x==null||!isFinite(x))return "--";
  let ms=Math.round(x*1000);
  let m=Math.floor(ms/60000);
  let s=Math.floor((ms%60000)/1000);
  let mm=ms%1000;
  return `${m}:${String(s).padStart(2,"0")}.${String(mm).padStart(3,"0")}`;
}

function readVirt(){
  let v=$("virt").value.trim();
  if(v==="")return 100;
  let n=parseFloat(v);
  return isFinite(n)&&n>0?n:null;
}

function calc(){
  let top=parseTime($("top").value);
  let mine=parseTime($("mine").value);
  $("topRead").textContent="認識: "+top.text;
  $("mineRead").textContent="認識: "+mine.text;
  $("topRead").className=top.ok||!$("top").value?"read":"read err";
  $("mineRead").className=mine.ok||!$("mine").value?"read":"read err";

  let vp=readVirt();
  if(!top.ok||!mine.ok||!vp){
    $("ratio").textContent="-- %";
    $("mineBig").textContent="--";
    $("topBig").textContent="--";
    $("virtualBig").textContent="--";
    ["p105","p110","p115","p120"].forEach(id=>$(id).textContent="--");
    saveState();
    return null;
  }

  let virtualTop=top.sec/(vp/100);
  let ratio=mine.sec/virtualTop*100;
  $("mineBig").textContent=fmt(mine.sec);
  $("ratio").textContent=ratio.toFixed(2)+" %";
  $("topBig").textContent=fmt(top.sec);
  $("virtualBig").textContent=fmt(virtualTop);
  $("p105").textContent=fmt(virtualTop*1.05);
  $("p110").textContent=fmt(virtualTop*1.10);
  $("p115").textContent=fmt(virtualTop*1.15);
  $("p120").textContent=fmt(virtualTop*1.20);

  saveState();
  return {top,mine,vp,virtualTop,ratio};
}

function saveState(){
  let o={top:$("top").value,virt:$("virt").value,mine:$("mine").value};
  localStorage.setItem(STATE,JSON.stringify(o));
}
function loadState(){
  let o=JSON.parse(localStorage.getItem(STATE)||"{}");
  ["top","virt","mine"].forEach(k=>{if(o[k]!=null)$(k).value=o[k]});
  let m=JSON.parse(localStorage.getItem(META)||"{}");
  ["event","date","machine","tire","memo"].forEach(k=>{if(m[k]!=null)$(k).value=m[k]});
  calc();
}
function saveMeta(){
  let m={event:$("event").value,date:$("date").value,machine:$("machine").value,tire:$("tire").value,memo:$("memo").value};
  localStorage.setItem(META,JSON.stringify(m));
}

["top","virt","mine"].forEach(id=>$(id).addEventListener("input",calc));
["event","date","machine","tire","memo"].forEach(id=>$(id).addEventListener("input",saveMeta));

$("saveBtn").onclick=()=>{
  let c=calc();
  if(!c){alert("計算できるタイムを入力してください");return;}
  $("calcPage").classList.add("hidden");
  $("savePage").classList.remove("hidden");
};

function hideSave(){
  $("savePage").classList.add("hidden");
  $("calcPage").classList.remove("hidden");
}

function saveLog(){
  let c=calc();
  if(!c){alert("計算できるタイムを入力してください");return;}
  saveMeta();
  let logs=JSON.parse(localStorage.getItem(STORE)||"[]");
  logs.unshift({
    savedAt:new Date().toISOString(),
    event:$("event").value,date:$("date").value,machine:$("machine").value,tire:$("tire").value,memo:$("memo").value,
    topRaw:$("top").value,virtRaw:$("virt").value,mineRaw:$("mine").value,
    topFmt:c.top.text,virtualTopFmt:fmt(c.virtualTop),mineFmt:c.mine.text,
    ratio:c.ratio.toFixed(2),
    p105:fmt(c.virtualTop*1.05),p110:fmt(c.virtualTop*1.10),p115:fmt(c.virtualTop*1.15),p120:fmt(c.virtualTop*1.20)
  });
  logs=logs.slice(0,99);
  localStorage.setItem(STORE,JSON.stringify(logs));
  alert("保存しました");
  hideSave();
}

function showLog(){
  $("calcPage").classList.add("hidden");
  $("savePage").classList.add("hidden");
  $("logPage").classList.remove("hidden");
  loadLogs();
}
function showCalc(){
  $("logPage").classList.add("hidden");
  $("calcPage").classList.remove("hidden");
}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function loadLogs(){
  let logs=JSON.parse(localStorage.getItem(STORE)||"[]");
  $("logList").innerHTML=logs.length?"":"<div class='log'>Logはまだありません</div>";
  logs.forEach((l,i)=>{
    let d=document.createElement("div");
    d.className="log";
    d.innerHTML=`<b style="font-size:1.5rem">${esc(l.ratio)}%</b><br>
    ${esc(l.date)} ${esc(l.event)}<br>
    ${esc(l.machine)} / ${esc(l.tire)}<br>
    トップ ${esc(l.topFmt)} / 仮想トップ ${esc(l.virtualTopFmt)} / 自分 ${esc(l.mineFmt)}<br>
    105% ${esc(l.p105)}　110% ${esc(l.p110)}　115% ${esc(l.p115)}　120% ${esc(l.p120)}<br>
    ${esc(l.memo||"")}<br>
    <button onclick="loadOne(${i})">読込</button>
    <button class="danger" onclick="delLog(${i})">削除</button>`;
    $("logList").appendChild(d);
  });
}
function loadOne(i){
  let l=JSON.parse(localStorage.getItem(STORE)||"[]")[i];
  if(!l)return;
  $("top").value=l.topRaw;$("virt").value=l.virtRaw;$("mine").value=l.mineRaw;
  $("event").value=l.event;$("date").value=l.date;$("machine").value=l.machine;$("tire").value=l.tire;$("memo").value=l.memo;
  saveMeta();calc();showCalc();
}
function delLog(i){
  if(!confirm("このLogを削除しますか？"))return;
  let logs=JSON.parse(localStorage.getItem(STORE)||"[]");
  logs.splice(i,1);
  localStorage.setItem(STORE,JSON.stringify(logs));
  loadLogs();
}
function clearLogs(){
  if(confirm("Logを全削除しますか？")){
    localStorage.removeItem(STORE);
    loadLogs();
  }
}
function csvEsc(v){return `"${String(v??"").replace(/"/g,'""')}"`}
function csv(){
  let logs=JSON.parse(localStorage.getItem(STORE)||"[]");
  let header=["年月日","大会・練習会","マシン","タイヤ","トップタイム","仮想トップ比","仮想トップタイム","自分タイム","タイム比","105%","110%","115%","120%","メモ","保存日時"];
  let rows=logs.map(l=>[l.date,l.event,l.machine,l.tire,l.topFmt,l.virtRaw||"100",l.virtualTopFmt,l.mineFmt,l.ratio,l.p105,l.p110,l.p115,l.p120,l.memo,l.savedAt]);
  let out=[header,...rows].map(r=>r.map(csvEsc).join(",")).join("\\n");
  let blob=new Blob(["\\ufeff"+out],{type:"text/csv;charset=utf-8"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="motoGYM_calc_log.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}



["clrTop","clrVirt","clrMine"].forEach((id,idx)=>{
 document.getElementById(id).onclick=()=>{
   const target=["top","virt","mine"][idx];
   document.getElementById(target).value="";
   calc();
 };
});
document.getElementById("clearBtn").textContent="全入力クリア";

document.getElementById("clearBtn").onclick=function(){
 if(!confirm("入力値をクリアしますか？")) return;
 ["top","virt","mine"].forEach(id=>document.getElementById(id).value="");
 calc();
 try{localStorage.removeItem(STATE);}catch(e){}
};


function showVersion(){
  ["calcPage","savePage","logPage"].forEach(id=>{
    const e=document.getElementById(id);
    if(e)e.classList.add("hidden");
  });
  document.getElementById("versionPage").classList.remove("hidden");
}
function hideVersion(){
  document.getElementById("versionPage").classList.add("hidden");
  document.getElementById("calcPage").classList.remove("hidden");
}
document.getElementById("appTitle").onclick=showVersion;

loadState();
</script>
</body>
</html>
