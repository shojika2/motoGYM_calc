<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>motoGYM_calc v0.0.02</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;background:#111;color:#fff}
header{padding:12px;background:#222;text-align:center;font-size:1.4rem;font-weight:bold}
small{display:block;color:#bbb}
.page{padding:14px;max-width:520px;margin:auto}
label{display:block;margin-top:12px;font-size:1.05rem}
input,textarea{width:100%;font-size:1.25rem;padding:10px;box-sizing:border-box}
button{width:100%;padding:14px;margin-top:10px;font-size:1.1rem}
.card{background:#222;padding:10px;margin:8px 0;border-radius:8px}
.hidden{display:none}
.result{font-size:1.5rem;font-weight:bold}
table{width:100%}
td{padding:3px}
</style>
</head>
<body>
<header>motoGYM_calc<small>v0.0.02</small></header>

<div id="main" class="page">
<label>トップタイム</label><input id="top" inputmode="numeric">
<label>仮想トップ比(%)</label><input id="virt" inputmode="decimal" value="100">
<label>自分のタイム</label><input id="mine" inputmode="numeric">
<div class="card">
<div class="result" id="ratio">-- %</div>
<table id="tbl"></table>
</div>
<h3>保存情報</h3>
<input id="event" placeholder="大会・練習会">
<input id="date" placeholder="年月日">
<input id="machine" placeholder="マシン">
<input id="tire" placeholder="タイヤ">
<textarea id="memo" placeholder="メモ"></textarea>
<button id="save">保存</button>
<button onclick="showLog()">Log画面</button>
</div>

<div id="logs" class="page hidden">
<button onclick="showMain()">戻る</button>
<button onclick="csv()">CSV出力</button>
<button onclick="if(confirm('全削除')){localStorage.removeItem('mgc_logs');loadLogs()}">全削除</button>
<div id="list"></div>
</div>

<script>
const ids=["top","virt","mine","event","date","machine","tire","memo"];
function parse(v){
 v=(v||"").replace(/\D/g,"");
 if(!v)return null;
 if(v.length<=5){
   let s=parseInt(v.slice(0,-3)||0),ms=v.slice(-3).padStart(3,"0");
   return s+Number(ms)/1000;
 }
 let ms=v.slice(-3),sec=v.slice(-5,-3),min=v.slice(0,-5);
 return parseInt(min)*60+parseInt(sec)+Number(ms)/1000;
}
function fmt(t){
 if(t==null)return "--";
 let m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.round((t%1)*1000);
 return m?`${m}:${String(s).padStart(2,"0")}.${String(ms).padStart(3,"0")}`:`${s}.${String(ms).padStart(3,"0")}`;
}
function calc(){
 let top=parse(topEl.value),me=parse(mineEl.value),v=parseFloat(virtEl.value)||100;
 if(!top||!me)return;
 let vt=top/(v/100),r=me/vt*100;
 ratio.textContent=r.toFixed(2)+" %";
 let h="";
 [105,110,115,120].forEach(p=>h+=`<tr><td>${p}%</td><td>${fmt(vt*p/100)}</td></tr>`);
 tbl.innerHTML=h;
 saveState();
}
function saveState(){let o={};ids.forEach(i=>o[i]=document.getElementById(i).value);localStorage.setItem("mgc_state",JSON.stringify(o));}
function loadState(){let o=JSON.parse(localStorage.getItem("mgc_state")||"{}");ids.forEach(i=>{if(o[i]!=null)document.getElementById(i).value=o[i]});calc();}
const topEl=top,mineEl=mine,virtEl=virt;
ids.forEach(i=>document.getElementById(i).addEventListener("input",calc));
[top,mine].forEach((e,i)=>e.addEventListener("change",()=>{if(i==0)virt.focus();else if(i==1)event.focus();}));
virt.addEventListener("change",()=>mine.focus());
save.onclick=()=>{
 let logs=JSON.parse(localStorage.getItem("mgc_logs")||"[]");
 let topv=parse(top.value),me=parse(mine.value),vt=topv/(parseFloat(virt.value)/100),ratioV=(me/vt*100).toFixed(2);
 logs.unshift({event:event.value,date:date.value,machine:machine.value,tire:tire.value,memo:memo.value,top:top.value,virt:virt.value,mine:mine.value,ratio:ratioV});
 logs=logs.slice(0,99);
 localStorage.setItem("mgc_logs",JSON.stringify(logs));
 alert("保存しました");
};
function showLog(){main.classList.add("hidden");logs.classList.remove("hidden");loadLogs();}
function showMain(){logs.classList.add("hidden");main.classList.remove("hidden");}
function loadLogs(){
 let logs=JSON.parse(localStorage.getItem("mgc_logs")||"[]");
 list.innerHTML="";
 logs.forEach((l,i)=>{
 let d=document.createElement("div");d.className="card";
 d.innerHTML=`<div style="font-size:1.4rem">${l.ratio}%</div>${l.date} ${l.event}<br>${l.machine} ${l.tire}<br>
 <button onclick='loadOne(${i})'>読込</button>
 <button onclick='del(${i})'>削除</button>`;
 list.appendChild(d);
 });
}
function loadOne(i){
 let l=JSON.parse(localStorage.getItem("mgc_logs"))[i];
 top.value=l.top;virt.value=l.virt;mine.value=l.mine;event.value=l.event;date.value=l.date;machine.value=l.machine;tire.value=l.tire;memo.value=l.memo;
 calc();showMain();
}
function del(i){
 let a=JSON.parse(localStorage.getItem("mgc_logs"));a.splice(i,1);
 localStorage.setItem("mgc_logs",JSON.stringify(a));loadLogs();
}
function csv(){
 let a=JSON.parse(localStorage.getItem("mgc_logs")||"[]");
 let out="年月日,大会,マシン,タイヤ,トップ,仮想比,自分,タイム比,メモ\n";
 a.forEach(l=>out+=`${l.date},${l.event},${l.machine},${l.tire},${l.top},${l.virt},${l.mine},${l.ratio},${(l.memo||"").replace(/,/g," ")}\n`);
 let blob=new Blob(["\ufeff"+out],{type:"text/csv"});
 let x=document.createElement("a");x.href=URL.createObjectURL(blob);x.download="motoGYM_calc_log.csv";x.click();
}
loadState();
</script>
</body>
</html>
